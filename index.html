<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KULTUS FILM | Sinema Hitam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Syne:wght@400;800&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <style>
        :root { --crimson: #660000; --dark: #030303; }
        body { 
            background-color: var(--dark); 
            color: #afafaf; 
            font-family: 'Syne', sans-serif;
            overflow-x: hidden;
        }
        
        /* Efek Grain/Bintik Film Tua */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.05; pointer-events: none; z-index: 100;
        }

        .gothic-text { font-family: 'UnifrakturMaguntia', serif; }
        .horror-font { font-family: 'Creepster', system-ui; }

        /* Movie Card Hover */
        .movie-card {
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            filter: grayscale(100%) contrast(1.1);
        }
        .movie-card:hover {
            filter: grayscale(0%) contrast(1);
            transform: scale(1.02) rotate(1deg);
            z-index: 20;
        }

        .blood-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--crimson), transparent);
        }

        @keyframes flicker {
            0% { opacity: 0.8; } 5% { opacity: 0.1; } 10% { opacity: 0.9; }
            15% { opacity: 0.2; } 25% { opacity: 0.8; } 100% { opacity: 1; }
        }
        .flicker { animation: flicker 3s infinite; }
    </style>
</head>
<body class="p-0 m-0">

    <div class="fixed inset-0 pointer-events-none bg-[radial-gradient(circle_at_50%_50%,rgba(0,0,0,0)_0%,rgba(0,0,0,1)_90%)] z-40"></div>

    <nav class="relative z-50 py-12 px-10 flex flex-col items-center">
        <span class="text-red-900 tracking-[1em] text-xs font-bold mb-4 flicker">MANIFESTASI VISUAL</span>
        <h1 class="gothic-text text-7xl md:text-9xl text-red-700 opacity-80 mb-2">Kultus</h1>
        <div class="blood-line w-full max-w-lg mb-4"></div>
        <p class="text-[10px] tracking-[0.4em] uppercase opacity-40">Arsip Horor Indonesia Paling Mencekam</p>
    </nav>

    <main class="relative z-30 max-w-[1600px] mx-auto px-10 pb-40">
        <div id="horror-vault" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-12">
            <div class="col-span-full h-96 flex items-center justify-center">
                <div class="horror-font text-4xl text-zinc-800 animate-pulse">Menunggu Ritual...</div>
            </div>
        </div>
    </main>

    <footer class="relative z-50 py-20 border-t border-zinc-900 flex flex-col items-center">
        <div class="text-zinc-700 text-[9px] tracking-widest uppercase">Tinggalkan Jejak Sebelum Gelap Memakanmu</div>
        <div class="mt-4 flex gap-8 text-zinc-800 font-bold">
            <span class="hover:text-red-900 cursor-crosshair">INSTAGRAM</span>
            <span class="hover:text-red-900 cursor-crosshair">TELEGRAM</span>
            <span class="hover:text-red-900 cursor-crosshair">GITHUB</span>
        </div>
    </footer>

    <script>
        const KEY = '8db9f61b7b7528e67831d1d6a62451c8';
        const ENDPOINT = `https://api.themoviedb.org/3/discover/movie?api_key=${KEY}&with_genres=27&with_original_language=id&sort_by=primary_release_date.desc`;
        const IMG_URL = 'https://image.tmdb.org/t/p/w780';

        async function summonMovies() {
            const vault = document.getElementById('horror-vault');
            try {
                const res = await fetch(ENDPOINT);
                const data = await res.json();
                
                vault.innerHTML = '';
                data.results.forEach(film => {
                    const div = document.createElement('div');
                    div.className = 'movie-card group flex flex-col';
                    div.innerHTML = `
                        <div class="relative overflow-hidden bg-zinc-950 border border-zinc-900">
                            <img src="${film.poster_path ? IMG_URL + film.poster_path : 'https://via.placeholder.com/500x750/000/333?text=LOST+SOUL'}" 
                                 class="w-full grayscale group-hover:grayscale-0 transition-all duration-700">
                            <div class="absolute inset-0 bg-gradient-to-t from-black to-transparent opacity-90"></div>
                            <div class="absolute bottom-4 left-4 right-4">
                                <span class="text-[9px] text-red-800 font-bold tracking-widest uppercase">${film.release_date || '????'}</span>
                                <h3 class="horror-font text-2xl text-zinc-300 group-hover:text-red-600 transition-colors leading-none mt-1">${film.title}</h3>
                            </div>
                        </div>
                        <div class="mt-4 opacity-0 group-hover:opacity-100 transition-all duration-500 transform translate-y-2 group-hover:translate-y-0">
                            <p class="text-[10px] text-zinc-500 leading-relaxed italic line-clamp-2">"${film.overview}"</p>
                            <div class="mt-4 flex gap-4">
                                <button class="text-[9px] border border-red-900/40 px-3 py-1 hover:bg-red-950/20 text-red-700">LIHAT TRAILER</button>
                                <span class="text-[9px] py-1 text-zinc-700 uppercase font-black tracking-tighter">SKOR: ${film.vote_average}</span>
                            </div>
                        </div>
                    `;
                    vault.appendChild(div);
                });
            } catch (err) {
                vault.innerHTML = '<div class="col-span-full text-center horror-font text-red-900">KONEKSI TERPUTUS OLEH KEKUATAN GAIB.</div>';
            }
        }

        summonMovies();
    </script>
</body>
</html>
