<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINEAS MISTIS | Arsip Horor Nusantara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --blood-red: #880808; --void-black: #050505; }
        body { 
            background-color: var(--void-black); 
            color: #d1d1d1; 
            font-family: 'Quicksand', sans-serif;
            background-image: radial-gradient(circle at center, #1a0505 0%, #050505 100%);
        }
        .cinematic-title { font-family: 'Cinzel', serif; letter-spacing: 4px; }
        .movie-card { transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); border: 1px solid #1a1a1a; }
        .movie-card:hover { border-color: var(--blood-red); transform: translateY(-10px); box-shadow: 0 0 20px rgba(136, 8, 8, 0.4); }
        .movie-card img { filter: sepia(50%) contrast(1.2) brightness(0.7); transition: 0.5s; }
        .movie-card:hover img { filter: sepia(0%) contrast(1) brightness(1); }
        .vignette { pointer-events: none; position: fixed; inset: 0; box-shadow: inset 0 0 150px rgba(0,0,0,0.9); z-index: 50; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: var(--blood-red); }
    </style>
</head>
<body>
    <div class="vignette"></div>

    <nav class="relative z-10 flex justify-between items-center p-8 border-b border-red-950/20 bg-black/50 backdrop-blur-md">
        <h1 class="cinematic-title text-2xl text-red-700 font-bold">SINEAS MISTIS</h1>
        <div class="text-[10px] tracking-[0.3em] uppercase opacity-50">Est. 2026 • Digital Archive</div>
    </nav>

    <header class="relative z-10 py-20 px-8 text-center">
        <h2 class="cinematic-title text-5xl md:text-7xl mb-4 font-bold bg-gradient-to-b from-red-600 to-red-950 bg-clip-text text-transparent italic">TEROR NUSANTARA</h2>
        <p class="max-w-2xl mx-auto text-gray-500 font-light leading-relaxed">Menjelajahi sisi gelap sinema Indonesia. Temukan arsip kutukan, legenda urban, dan jeritan yang tak terdengar.</p>
    </header>

    <main class="relative z-10 max-w-7xl mx-auto px-6 pb-24">
        <div id="movie-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
            <div class="col-span-full text-center py-20">
                <span class="animate-pulse text-red-900 tracking-widest uppercase">Membangkitkan Suasana...</span>
            </div>
        </div>
    </main>

    <footer class="relative z-10 py-10 border-t border-red-950/20 text-center text-[10px] text-gray-600 tracking-widest">
        &copy; 2026 SINEAS MISTIS ART PROJECT. POWERED BY TMDB ENGINE.
    </footer>

    <script>
        // Menggunakan Read-Only Access Token (Simulasi API Fetch)
        // Catatan: Ini adalah endpoint discovery yang difilter untuk Region ID & Genre Horror
        const API_KEY = '8db9f61b7b7528e67831d1d6a62451c8'; // API Key publik untuk demo
        const API_URL = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=27&with_original_language=id&sort_by=popularity.desc`;
        const IMG_BASE = 'https://image.tmdb.org/t/p/w500';

        async function loadHorrorMovies() {
            const container = document.getElementById('movie-container');
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                container.innerHTML = '';
                data.results.forEach(movie => {
                    const releaseYear = movie.release_date ? movie.release_date.split('-')[0] : 'N/A';
                    const el = document.createElement('div');
                    el.className = 'movie-card bg-zinc-950 rounded-sm overflow-hidden group relative';
                    el.innerHTML = `
                        <div class="relative overflow-hidden aspect-[2/3]">
                            <img src="${IMG_BASE}${movie.poster_path}" alt="${movie.title}" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-80"></div>
                        </div>
                        <div class="p-4 relative">
                            <div class="text-[10px] text-red-800 font-bold mb-1 italic">${releaseYear}</div>
                            <h3 class="cinematic-title text-sm text-gray-200 group-hover:text-red-600 transition-colors line-clamp-1">${movie.title.toUpperCase()}</h3>
                            <div class="mt-3 flex items-center justify-between opacity-0 group-hover:opacity-100 transition-opacity duration-500">
                                <span class="text-[9px] text-gray-500 uppercase tracking-tighter">Rating: ${movie.vote_average}/10</span>
                                <button class="text-[10px] text-red-700 hover:text-red-500 underline uppercase tracking-widest">Detail</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(el);
                });
            } catch (err) {
                container.innerHTML = '<p class="text-red-900 col-span-full text-center">Ritual Gagal. Koneksi terputus.</p>';
            }
        }

        window.onload = loadHorrorMovies;
    </script>
</body>
</html>
